[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # 여러 기기 제출을 Netlify Functions + Blobs로 같은 출처 /api/* 에 모음
  VITE_SUBMISSIONS_SAME_ORIGIN = "true"
  # 배포 환경: AI 채팅 이미지·페이로드를 Functions 한도에 맞게 축소
  VITE_NETLIFY_DEPLOY = "true"
  # Pro 채팅 시 클라이언트 이미지 압축 강화 (빌드에 포함)
  VITE_GEMINI_CHAT_MODEL = "gemini-2.5-pro"
  # Pro 채팅: 26초 동기 한도 대신 Background Function + 폴링
  VITE_AI_CHAT_BACKGROUND = "true"

[functions]
  node_bundler = "esbuild"

# Gemini 비전(회로도)은 10초 기본 한도로 자주 끊김 → Pro 플랜에서 최대 26초까지 허용
[functions."openai-chat"]
  timeout = 26

# 로컬에서 Netlify와 동일하게(Functions + 리다이렉트 + Blobs) 테스트: npm run dev:netlify
# 브라우저는 보통 http://localhost:8888 — Vite(5173)로 프록시됩니다.
[dev]
  command = "npm run dev"
  targetPort = 5173

# 제출 동기화 API → submissions-sync (Blobs). openai 보다 먼저 둘 필요는 없으나 명시적으로 상단에 둠.
[[redirects]]
  from = "/api/submissions/:submissionId/status"
  to = "/.netlify/functions/submissions-sync?mode=status&rid=:submissionId"
  status = 200
  force = true

[[redirects]]
  from = "/api/submissions/:submissionId"
  to = "/.netlify/functions/submissions-sync?mode=record&rid=:submissionId"
  status = 200
  force = true

[[redirects]]
  from = "/api/submissions"
  to = "/.netlify/functions/submissions-sync?mode=list"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/teacher/login"
  to = "/.netlify/functions/submissions-sync?mode=auth"
  status = 200
  force = true

# Pro 채팅 백그라운드 작업 (26초 초과 분석)
[[redirects]]
  from = "/api/openai/chat/job"
  to = "/.netlify/functions/ai-chat-jobs"
  status = 200
  force = true

# 브라우저는 계속 /api/openai/chat 으로 요청하고, Netlify Function이 Gemini를 호출합니다.
[[redirects]]
  from = "/api/openai/chat"
  to = "/.netlify/functions/openai-chat"
  status = 200
  force = true
